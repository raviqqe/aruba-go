name: raviqqe/aruba-go
description: Run Aruba in Go
branding:
  icon: aperture
  color: red
inputs: {}
outputs: {}
runs:
  using: composite
  steps:
    - run: |
        if command -v agoa > /dev/null; then
          agoa --strict
        else
          go run github.com/raviqqe/aruba-go/cmd/agoa@latest --strict
        fi
      shell: bash
